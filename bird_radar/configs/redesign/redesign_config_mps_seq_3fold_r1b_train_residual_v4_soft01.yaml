seed: 2026

paths:
  project_root: /Users/sgrisshk/Desktop/AI-task/bird_radar
  data_dir: /Users/sgrisshk/Desktop/AI-task
  cache_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/cache
  output_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/redesign_mps_seq_3fold_r1b_train_residual_v4_soft01

cv:
  n_splits: 5

debug:
  overfit_subset: 0
  overfit_fold: 0
  overfit_same_val: false
  max_folds: 3

sequence:
  seq_len: 128
  norm_mode: global_robust
  clip_abs: 20.0
  keep_raw_channels: [x, y, z, rcs, speed, vertical_speed, accel, curvature, dt]
  robust_channels: [rcs, speed, accel, dt]
  log_dt: false
  dt_eps: 1e-6
  delta_channels: []
  delta_clip_abs: 10.0
  channel_dropout_p: 0.05
  time_dropout_p: 0.0
  channel_dropout_candidates: [dt, accel]

model:
  mode: seq_only
  seq_branch: tcn_only
  architectures: [tcn_heavy]
  seeds: [42]
  pooling: mean
  seq_dropout: 0.15
  tab_dropout: 0.10

train:
  device: mps
  strict_device: true
  ablation_mode: full
  batch_size: 64
  eval_batch_size: 128
  epochs: 60
  patience: 12
  lr: 0.0008
  weight_decay: 0.00003
  grad_clip: 1.0
  amp: false
  focal_gamma: 1.5
  domain_loss_weight: 0.0
  domain_warmup_epochs: 0
  domain_target_augment: false
  tta_val_runs: 0
  tta_test_runs: 0
  class_specialized_heads: false
  weak_k: 3
  weak_finetune_epochs: 0
  weak_boost: 1.0
  debug_batch_stats: false
  report_train_metric: true

aug:
  mixup: false
  mixup_alpha: 0.2
  time_reverse_prob: 0.0
  time_crop_min: 0.8

distill:
  enabled: true
  teacher_oof_csv: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/oof_csv_for_per_class/oof_base_forward_complete.csv
  teacher_test_csv: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/temporal_model0_reg_drop10_none_complete/sub_temporal_best.csv
  teacher_id_col: track_id
  teacher_cols: [Clutter, Cormorants, Pigeons, Ducks, Geese, Gulls, Birds of Prey, Waders, Songbirds]
  residual_mode: true
  delta_l2: 0.0003
  temperature: 2.0
  alpha_true: 0.9
  alpha_soft: 0.1
  warmup_soft_epochs: 0
  soft_loss: bce

shift:
  drop_top_feature_pct: 0.0

blend:
  top_n_exports: 1
  weight_perturb_std: 0.0

tabular:
  iterations: 3000
  depth: 6
  learning_rate: 0.03
  l2_leaf_reg: 8.0

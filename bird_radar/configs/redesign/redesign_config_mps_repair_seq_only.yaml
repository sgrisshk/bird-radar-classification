seed: 2026

paths:
  project_root: /Users/sgrisshk/Desktop/AI-task/bird_radar
  data_dir: /Users/sgrisshk/Desktop/AI-task
  cache_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/cache
  output_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/redesign_mps_repair_seq_only

cv:
  n_splits: 5

sequence:
  seq_len: 128
  norm_mode: global_robust
  clip_abs: 20.0

model:
  architectures: [tcn_heavy]
  seeds: [42]

train:
  device: mps
  strict_device: true
  ablation_mode: seq_only
  batch_size: 16
  eval_batch_size: 32
  epochs: 20
  patience: 4
  lr: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0
  amp: false
  focal_gamma: 1.5
  domain_loss_weight: 0.0
  domain_warmup_epochs: 3
  domain_target_augment: false
  tta_val_runs: 0
  tta_test_runs: 0
  class_specialized_heads: true
  weak_k: 3
  weak_finetune_epochs: 2
  weak_boost: 1.5

aug:
  mixup: false
  mixup_alpha: 0.2
  time_reverse_prob: 0.0
  time_crop_min: 0.8

shift:
  drop_top_feature_pct: 0.0

blend:
  top_n_exports: 3
  weight_perturb_std: 0.03

tabular:
  iterations: 3000
  depth: 6
  learning_rate: 0.03
  l2_leaf_reg: 8.0

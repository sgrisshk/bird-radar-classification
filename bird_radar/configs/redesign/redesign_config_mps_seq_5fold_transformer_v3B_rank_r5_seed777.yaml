seed: 777

paths:
  project_root: /Users/sgrisshk/Desktop/AI-task/bird_radar
  data_dir: /Users/sgrisshk/Desktop/AI-task
  cache_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/cache
  output_dir: /Users/sgrisshk/Desktop/AI-task/bird_radar/artifacts/redesign_mps_seq_5fold_transformer_v3B_rank_r5_seed777

cv:
  n_splits: 5

debug:
  overfit_subset: 0
  overfit_fold: 0
  overfit_same_val: false
  max_folds: 5

sequence:
  seq_len: 512
  norm_mode: global_robust
  clip_abs: 20.0
  keep_raw_channels: [x, y, z, rcs, speed, vertical_speed, accel, curvature, dt]
  robust_channels: [rcs, speed, accel, dt]
  log_dt: false
  dt_eps: 1e-6
  delta_channels: []
  delta_clip_abs: 10.0
  channel_dropout_p: 0.05
  time_dropout_p: 0.08
  channel_dropout_candidates: [dt, accel, speed]
  group_dropout_channels:
    - [speed, vertical_speed, accel, curvature]
    - [dt, rcs]
  group_dropout_probs: [0.15, 0.10]

model:
  mode: seq_only
  seq_branch: tcn_trm
  architectures: [transformer_heavy]
  seeds: [777]
  pooling: gem
  gem_p: 3.0
  seq_dropout: 0.10
  tab_dropout: 0.10

train:
  device: mps
  strict_device: false
  ablation_mode: seq_only
  batch_size: 24
  eval_batch_size: 96
  epochs: 22
  patience: 7
  lr: 0.00012
  weight_decay: 0.02
  grad_clip: 1.0
  amp: false

  focal_gamma: 0.0
  loss_bce_weight: 0.0
  loss_focal_weight: 0.0
  loss_ranking_weight: 0.0
  ranking_margin: 0.20
  ranking_max_pairs: 8192
  loss_listwise_weight: 1.0
  listwise_temperature: 1.5

  use_pos_weight: false
  pos_weight_clip_max: 25.0

  domain_loss_weight: 0.0
  domain_warmup_epochs: 0
  domain_target_augment: false
  tta_val_runs: 0
  tta_test_runs: 0

  class_specialized_heads: false
  weak_k: 3
  weak_finetune_epochs: 0
  weak_boost: 1.0

  use_weighted_sampler: true
  sampler_clip_min: 0.5
  sampler_clip_max: 4.0
  sampler_uniform_mix: 0.30
  sampler_power: 0.75

  hard_mining_enabled: true
  hard_mining_start_epoch: 3
  hard_mining_fraction: 0.20
  hard_mining_mix: 0.25
  hard_mining_boost: 2.0
  hard_mining_clip_min: 0.5
  hard_mining_clip_max: 6.0
  hard_mining_group_enabled: false

  debug_batch_stats: false
  report_train_metric: true
  log_pred_diag: true

aug:
  mixup: false
  mixup_alpha: 0.2
  time_reverse_prob: 0.05
  time_crop_min: 0.80

distill:
  enabled: false

shift:
  drop_top_feature_pct: 0.0

blend:
  top_n_exports: 1
  weight_perturb_std: 0.0

tabular:
  iterations: 3000
  depth: 6
  learning_rate: 0.03
  l2_leaf_reg: 8.0
